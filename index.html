    <script>
      // Performance: Lazy load external scripts after 3 seconds
      function loadExternalScripts() {
        const scripts = [
          'https://www.googletagmanager.com/gtag/js?id=G-1C7PDETN0G',
          'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6762200025251358',
          'https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js',
          'https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1',
          'https://cdn.jsdelivr.net/npm/hls.js@latest'
        ];
        
        scripts.forEach(src => {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            document.body.appendChild(script);
        });
        
        // Handle GTAG specifically
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-1C7PDETN0G');
      }

      window.addEventListener('load', () => {
        setTimeout(loadExternalScripts, 3000);
      });
    </script>

    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      
      // Prevent OneSignal from throwing "Can only be used on: cclite.pl" on preview domains
      const hostname = window.location.hostname;
      const isOneSignalAllowed = 
        hostname === 'cclite.pl' || 
        hostname === 'www.cclite.pl' || 
        hostname === 'localhost' || 
        hostname === '127.0.0.1';

      if (isOneSignalAllowed) {
        OneSignalDeferred.push(async function(OneSignal) {
          await OneSignal.init({
            appId: "c68fe286-4c70-43b0-ba5a-1e4d195b09c6",
            safari_web_id: "web.onesignal.auto.5f176c09-6482-49c9-87ea-0c57aa3981a0",

                'dialog.button.background.active': '#A68043',
                'dialog.button.background': '#E2B859',
                'dialog.button.foreground': 'black'
              }
            },
          });
        });
      } else {
        console.warn('[OneSignal] Initialization skipped: domain not authorized (' + hostname + ').');
      }
    </script>

    <div id="root"></div>
    <div id="global-error" style="display: none; padding: 40px; color: #fff; background-color: #000; height: 100vh; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
      <h1 style="color: #C5A059; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; font-family: 'Playfair Display', serif; font-weight: 700; font-style: italic; text-shadow: 0 0 20px rgba(197, 160, 89, 0.4);">Krytyczny Błąd Systemu</h1>
      <pre id="global-error-msg" style="background-color: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; color: #ef4444; max-width: 85%; overflow: auto; font-size: 13px; border: 1px solid rgba(197, 160, 89, 0.3); font-family: 'JetBrains Mono', monospace; box-shadow: 0 20px 50px rgba(0,0,0,0.6);"></pre>
    </div>
    <div id="chunk-update-overlay" style="display: none;" class="fixed inset-0 z-[9999] flex-col items-center justify-between bg-[#050505] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1f160b] via-[#050505] to-black px-6 py-12 text-center select-none animate-fade-in-overlay overflow-hidden">
      <div class="flex flex-col h-full w-full justify-between animate-fade-in-up-content">
        <div class="mt-10">
          <h2 class="text-[#D4AF37] text-[26px] font-bold leading-snug tracking-wide uppercase" style="font-family: 'Lora', serif">
            Dostępna nowa wersja<br/>aplikacji
          </h2>
        </div>
        <div class="flex flex-1 items-center justify-center w-full my-8">
          <img src="/android-chrome-512x512.png" alt="Christian Culture Radio" class="w-64 h-auto drop-shadow-[0_0_15px_rgba(212,175,55,0.2)] object-contain">
        </div>
        <div class="w-full space-y-8 pb-safe">
          <div class="text-base leading-relaxed px-4 font-normal text-[#E2B859]">
            <p>Wykryliśmy nową wersję plików.<br/>Zaktualizuj aplikację, aby uniknąć błędów.</p>
          </div>
          <button id="chunk-update-btn" class="animate-pulse-gold w-full bg-[#E5BA73] hover:bg-[#D4AF37] text-black font-extrabold py-[18px] rounded-xl transition-all uppercase tracking-widest text-lg active:scale-95 shadow-[0_4px_14px_rgba(229,186,115,0.3)]">
            Aktualizuj teraz
          </button>
        </div>
      </div>
    </div>
    <script>
      document.getElementById('chunk-update-btn').onclick = function(e) {
        e.currentTarget.classList.remove('animate-pulse-gold');
        e.currentTarget.innerText = "POBIERANIE...";
        e.currentTarget.disabled = true;
        e.currentTarget.style.opacity = "0.7";
        e.currentTarget.style.boxShadow = "none";
        
        if (navigator.serviceWorker) {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg && reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            } else {
              window.location.reload(true);
            }
          });
        } else {
          window.location.reload(true);
        }
      };

      window.addEventListener('error', (e) => {
          if (e.message && (e.message.includes('Failed to fetch dynamically imported module') || e.message.includes('Loading chunk') || e.message.includes('Importing a module script failed'))) {
            console.warn('Wykryty błąd ładowania modułu (Chunk Load Error). Pokazywanie natywnego ekranu aktualizacji...');
            e.preventDefault(); // Zapobiegnij wyświetlaniu standardowego błędu

            // Pokaż nakładkę
            const overlay = document.getElementById('chunk-update-overlay');
            if (overlay) {
              overlay.style.display = 'flex';
              overlay.classList.add('active');
            }
            
            // Ukryj ewentualne inne błędy
            const errBox = document.getElementById('global-error');
            if (errBox) errBox.style.display = 'none';

            // Odtwórz dźwięk
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const oscillator = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              oscillator.type = 'sine';
              oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
              oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
              gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
              gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
              oscillator.connect(gainNode);
              gainNode.connect(audioCtx.destination);
              oscillator.start();
              oscillator.stop(audioCtx.currentTime + 0.5);
            } catch (err) {}
            // Wibracje
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
          }
        }, true);

        window.onerror = function(message, source, lineno, colno, error) {
          const msg = typeof message === 'string' ? message : '';
          const isBenign = 
            msg.includes('Can only be used on') || 
            msg.includes('Script error') ||
            msg.includes('WebSocket') ||
            msg.includes('vite') ||
            msg.includes('stripe') ||
            msg.includes('payload') ||
            msg.includes('Failed to update a ServiceWorker') ||
            msg.includes('Failed to register a ServiceWorker') ||
            msg.includes('Service Worker registration failed') ||
            msg.includes('sw.js') ||
            msg.includes('dev-sw.js') ||
            msg.includes('Error in addDoc') ||
            msg.includes('permission_denied') || msg.includes('Missing or insufficient');

          if (isBenign) {
            return false;
          }
          document.getElementById('global-error').style.display = 'flex';
          document.getElementById('global-error-msg').textContent = message + '\n\n' + (error ? error.stack : '');
        };
        window.addEventListener('unhandledrejection', function(event) {
          const reasonStr = event.reason ? String(event.reason) : '';
          const isBenign = 
            reasonStr.includes('Can only be used on') || 
            reasonStr.includes('Script error') ||
            reasonStr.includes('WebSocket') ||
            reasonStr.includes('vite') ||
            reasonStr.includes('stripe') ||
            reasonStr.includes('payload') ||
            reasonStr.includes('Timeout: Message sending') ||
            reasonStr.includes('Failed to update a ServiceWorker') ||
            reasonStr.includes('Failed to register a ServiceWorker') ||
            reasonStr.includes('Service Worker registration failed') ||
            reasonStr.includes('sw.js') ||
            reasonStr.includes('dev-sw.js') ||
            reasonStr.includes('permission_denied') || reasonStr.includes('Missing or insufficient');

          if (isBenign) {
            return;
          }
          document.getElementById('global-error').style.display = 'flex';
          document.getElementById('global-error-msg').textContent = 'Unhandled Promise Rejection: ' + (event.reason ? (event.reason.stack || event.reason) : event);
        });

        window.__onGCastApiAvailable = function(isAvailable) {
          if (isAvailable && window.cast && window.chrome) {
            window.cast.framework.CastContext.getInstance().setOptions({
              receiverApplicationId: window.chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
              autoJoinPolicy: window.chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
          }
        };
        
        window.handleCredentialResponse = (response, isManagementCenter = false) => {
          const event = new CustomEvent('google-credential-response', { detail: { response, isManagementCenter } });
          window.dispatchEvent(event);
        };
    </script>
